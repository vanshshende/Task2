<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Daily Planner</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <nav>
        <h1>Smart Planner</h1>
        <ul>
            <li><a href="#form">Contact</a></li>
            <li><a href="#todo">Tasks</a></li>
        </ul>
    </nav>
</header>

<section class="hero">
    <h2>Organize Your Day Smartly</h2>
    <p>Manage tasks and stay connected easily.</p>
</section>

<main class="container">

    <!-- Contact Form -->
    <section id="form" class="card">
        <h2>Contact Us</h2>
        <form id="contactForm">
            <input type="text" id="name" placeholder="Enter Name">
            <input type="email" id="email" placeholder="Enter Email">
            <input type="text" id="phone" placeholder="Enter Phone">
            <textarea id="message" placeholder="Message"></textarea>
            <button type="submit">Submit</button>
        </form>
        <p id="formMsg"></p>
    </section>

    <!-- ToDo List -->
    <section id="todo" class="card">
        <h2>Daily Tasks</h2>
        <div class="todo-box">
            <input type="text" id="taskInput" placeholder="Add New Task">
            <button onclick="addTask()">Add</button>
        </div>
        <ul id="taskList"></ul>
    </section>

</main>

<footer>
    <p>© 2026 Smart Planner | Internship Project</p>
</footer>

<script src="script.js"></script>
</body>
</html>
